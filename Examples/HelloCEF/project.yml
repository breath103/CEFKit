name: HelloCEF
options:
  bundleIdPrefix: org.example
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true

packages:
  CEFKit:
    path: ../..

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ARCHS: arm64
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: NO

targets:

  # The host macOS app. Links the full CEFKit module (which embeds the
  # Chromium Embedded Framework). After Xcode builds the .app shell, a Run
  # Script Build Phase calls embed-cefkit.sh — that copies the framework +
  # assembles the 5 helper .app bundles + signs everything.
  HelloCEF:
    type: application
    platform: macOS
    sources:
      - path: Sources/HelloCEF
    info:
      path: HelloCEF/Info.plist
      properties:
        CFBundleDisplayName: HelloCEF
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleName: $(PRODUCT_NAME)
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "0.1"
        CFBundleVersion: "1"
        LSEnvironment:
          MallocNanoZone: "0"
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHighResolutionCapable: true
        NSPrincipalClass: NSApplication
        NSSupportsAutomaticGraphicsSwitching: true
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: org.example.HelloCEF
    dependencies:
      - package: CEFKit
        product: CEFKit
      - target: HelloCEFHelper
        # Build ordering only — the embed script picks up the helper from
        # $BUILT_PRODUCTS_DIR/HelloCEFHelper and copies it into all 5 helper
        # .app slots itself.
        embed: false
    postBuildScripts:
      - name: "[CEFKit] Embed framework + helpers"
        runOnlyWhenInstalling: false
        shell: /bin/bash
        script: |
          set -euo pipefail
          PKG="$SRCROOT/../.."
          export CEFKIT_FRAMEWORK_PATH="$PKG/vendor/cef/Release/Chromium Embedded Framework.framework"
          export CEFKIT_HELPER_PATH="$BUILT_PRODUCTS_DIR/HelloCEFHelper"
          export CEFKIT_HELPER_PLIST="$PKG/scripts/helper.plist.in"
          "$PKG/scripts/embed-cefkit.sh"

  # The sub-process binary. Same Mach-O is copied into all 5 helper .app
  # slots. Imports CEFKitHelper (NOT CEFKit) so SPM does not bake a
  # @executable_path/../Frameworks/... load command into it — the helper
  # dlopens the framework at runtime relative to the host bundle.
  HelloCEFHelper:
    type: tool
    platform: macOS
    sources:
      - path: Sources/HelloCEFHelper
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: org.example.HelloCEFHelper
    dependencies:
      - package: CEFKit
        product: CEFKitHelper

schemes:
  HelloCEF:
    build:
      targets:
        HelloCEFHelper: [build]
        HelloCEF: [build, run]
    run:
      config: Debug
      executable: HelloCEF
